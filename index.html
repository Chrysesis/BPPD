<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Layanan Informasi BPPD Prov. Kalbar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .chat-container { width: 100%; max-width: 600px; height: 100%; background: white; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header { background-color: #85C1E9; color: #333; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2em; border-bottom: 4px solid #003366; flex-shrink: 0; z-index: 10; }
        
        .header-spacer { width: 24px; }
        .btn-reset { background: none; border: none; color: #333; font-size: 1.2em; cursor: pointer; transition: transform 0.2s; padding: 0; }
        .btn-reset:hover { transform: scale(1.1); }
        
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #fafafa; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95em; word-wrap: break-word; }
        .user-msg { max-width: 80%; background-color: #d1ecf1; color: #0c5460; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #e2e3e5; color: #383d41; border-bottom-left-radius: 2px; flex-grow: 1; overflow-x: auto; }
        .ai-wrapper { display: flex; align-items: flex-end; align-self: flex-start; max-width: 90%; gap: 10px; }
        .bot-avatar { width: 35px; height: 35px; border-radius: 50%; background-color: #0056b3; padding: 2px; flex-shrink: 0; }
        
        .typing-indicator { display: flex; align-items: center; gap: 4px; height: 20px; font-style: italic; color: #666; font-size: 0.9em; font-weight: bold;}
        .typing-indicator span { display: block; width: 6px; height: 6px; background-color: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        .quick-replies { display: flex; gap: 8px; padding: 10px 15px; background: white; overflow-x: auto; white-space: nowrap; border-top: 1px solid #eee; flex-shrink: 0; scrollbar-width: none; -ms-overflow-style: none; }
        .quick-replies::-webkit-scrollbar { display: none; }
        
        .quick-replies button { background-color: #f8f9fa; color: #333; font-size: 0.85em; padding: 8px 14px; border-radius: 20px; border: 1px solid #85C1E9; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .quick-replies button:hover { background-color: #85C1E9; color: #333; }
        /* Style saat tombol quick reply di-disable */
        .quick-replies button:disabled { background-color: #e9ecef; border-color: #dee2e6; color: #adb5bd; cursor: not-allowed; }
        
        .input-area { display: flex; padding: 12px 15px; background: white; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        
        #user-input { flex-grow: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ccc; outline: none; transition: border 0.3s; font-size: 16px; width: 100%; }
        #user-input:focus { border-color: #85C1E9; }
        /* Style saat input di-disable */
        #user-input:disabled { background-color: #f8f9fa; cursor: not-allowed; }
        
        .btn-send { background-color: #85C1E9; color: #333; border: none; padding: 12px 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; flex-shrink: 0; }
        .btn-send:hover { background-color: #5DADE2; } 
        /* Style saat tombol kirim di-disable */
        .btn-send:disabled { background-color: #ccc; color: #666; cursor: not-allowed; }
        
        @media (min-width: 601px) {
            html, body { position: relative; } body { padding: 20px; }
            .chat-container { height: 85vh; max-height: 800px; border-radius: 12px; overflow: hidden; }
            .quick-replies { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; white-space: normal; overflow: hidden; }
            .quick-replies button { white-space: normal; height: 100%; padding: 10px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="header-spacer"></div>
            <span>Asisten Virtual BPPD</span>
            <button class="btn-reset" onclick="hapusObrolan()" title="Mulai Obrolan Baru">🗑️</button>
        </div>
        
        <div id="chat-box">
            <div class="ai-wrapper">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                <div class="msg-bubble ai-msg">
                    <b>Asisten BPPD:</b><br>Selamat datang di layanan informasi Badan Pengelola Perbatasan Daerah (BPPD) Provinsi Kalimantan Barat. Ada pertanyaan terkait profil instansi, tugas dan fungsi, atau layanan PPID yang bisa saya bantu hari ini?
                </div>
            </div>
        </div>
        
        <div class="quick-replies" id="quick-replies-container">
            <button onclick="setPertanyaan('Apa saja tugas pokok dan fungsi (Tupoksi) BPPD?')">Tugas & Fungsi BPPD</button>
            <button onclick="setPertanyaan('Bagaimana prosedur permohonan informasi PPID?')">Layanan Informasi PPID</button>
            <button onclick="setPertanyaan('Apa visi dan misi dari BPPD Kalbar?')">Visi & Misi Instansi</button>
            <button onclick="setPertanyaan('Di mana saja lokasi PLBN di Kalimantan Barat?')">Lokasi PLBN</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ketik pertanyaan seputar BPPD atau PPID..." onkeypress="handleEnter(event)">
            <button class="btn-send" id="btn-send" onclick="kirimPesan()">Kirim</button>
        </div>
    </div>

    <script>
        let riwayatPercakapan = ""; 
        let isWaitingResponse = false; // Penanda apakah AI sedang mengetik/berpikir

        function hapusObrolan() {
            if (isWaitingResponse) return; // Cegah hapus obrolan saat AI mengetik
            
            riwayatPercakapan = "";
            document.getElementById("chat-box").innerHTML = `
                <div class="ai-wrapper">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                    <div class="msg-bubble ai-msg">
                        <b>Asisten BPPD:</b><br>Memori obrolan telah dibersihkan. Mari mulai topik yang baru!
                    </div>
                </div>`;
        }

        function setPertanyaan(teks) {
            if (isWaitingResponse) return; // Cegah klik tombol rekomendasi saat AI mengetik
            document.getElementById("user-input").value = teks;
            kirimPesan();
        }

        function handleEnter(event) {
            if (event.key === "Enter" && !isWaitingResponse) { 
                kirimPesan(); 
            }
        }

        function setStatusInput(disabled) {
            isWaitingResponse = disabled;
            document.getElementById("user-input").disabled = disabled;
            document.getElementById("btn-send").disabled = disabled;
            
            // Matikan/nyalakan juga tombol quick replies
            const quickBtn = document.querySelectorAll("#quick-replies-container button");
            quickBtn.forEach(btn => btn.disabled = disabled);
        }

        async function kirimPesan() {
            if (isWaitingResponse) return;

            const inputElement = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const pesan = inputElement.value.trim();

            if (!pesan) return; 

            // 1. Matikan kolom input agar tidak bisa ngetik lagi
            setStatusInput(true);

            chatBox.innerHTML += `<div class="msg-bubble user-msg"><b>Anda:</b><br>${pesan}</div>`;
            inputElement.value = ""; 
            
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="ai-wrapper">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                    <div class="msg-bubble ai-msg">
                        <div class="typing-indicator">Mencari data <span></span><span></span><span></span></div>
                    </div>
                </div>`;
            
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // PASTIKAN FETCH INI MENUJU KE HUGGING FACE ATAU API KAMU
                const response = await fetch("https://chrysesis-bppd-va.hf.space", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        pertanyaan: pesan,
                        riwayat: riwayatPercakapan
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                const formattedAnswer = marked.parse(data.jawaban);
                const msgId = "msg-" + Date.now();

                // 2. Siapkan gelembung chat kosong untuk AI
                chatBox.innerHTML += `
                    <div class="ai-wrapper">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                        <div class="msg-bubble ai-msg">
                            <b>Asisten BPPD:</b><br><span id="${msgId}"></span>
                        </div>
                    </div>`;
                
                const textContainer = document.getElementById(msgId);
                let i = 0;
                let isTag = false;
                let currentHTML = "";

                // 3. Efek Mengetik (Typing Effect)
                const typeInterval = setInterval(() => {
                    if (i >= formattedAnswer.length) {
                        clearInterval(typeInterval);
                        // Buka kembali kolom input setelah selesai mengetik
                        setStatusInput(false);
                        inputElement.focus();
                        return;
                    }

                    let char = formattedAnswer.charAt(i);
                    currentHTML += char;
                    
                    // Deteksi tag HTML agar tidak diketik patah-patah (mencegah error tebal/miring)
                    if (char === '<') isTag = true;
                    if (char === '>') isTag = false;

                    if (!isTag) {
                        textContainer.innerHTML = currentHTML;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                    i++;
                }, 15); // Kecepatan mengetik: 15ms per huruf (bisa Anda ubah sesuai selera)

                riwayatPercakapan += `Pengguna: ${pesan}\nAsisten: ${data.jawaban}\n\n`;
                if(riwayatPercakapan.length > 1000) {
                    riwayatPercakapan = riwayatPercakapan.substring(riwayatPercakapan.length - 1000);
                }
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="ai-wrapper">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                        <div class="msg-bubble ai-msg" style="color: red;">
                            <b>Sistem:</b><br>Gagal terhubung ke Server.
                        </div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
                // Buka kembali kolom input jika terjadi error
                setStatusInput(false);
            }
        }
    </script>
</body>
</html>
