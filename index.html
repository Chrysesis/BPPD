<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Informasi BPPD Prov. Kalbar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background-color: #0056b3; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; border-bottom: 3px solid #003d82; }
        #chat-box { height: 450px; padding: 20px; overflow-y: auto; background-color: #fafafa; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-bubble { padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95em; }
        .msg-bubble a { color: #0056b3; text-decoration: underline; font-weight: bold; }
        .msg-bubble a:hover { color: #003d82; text-decoration: none; }
        .user-msg { max-width: 80%; background-color: #d1ecf1; color: #0c5460; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #e2e3e5; color: #383d41; border-bottom-left-radius: 2px; flex-grow: 1; overflow-x: auto; }
        
        /* CSS Baru untuk layout Foto Bot & Bubble AI */
        .ai-wrapper { display: flex; align-items: flex-end; align-self: flex-start; max-width: 85%; gap: 10px; }
        .bot-avatar { width: 35px; height: 35px; border-radius: 50%; background-color: #0056b3; padding: 2px; flex-shrink: 0; }
        
        /* CSS agar hasil Markdown (paragraf & list) rapi di dalam bubble */
        .msg-bubble p { margin: 0 0 10px 0; }
        .msg-bubble p:last-child { margin: 0; }
        .msg-bubble ul, .msg-bubble ol { margin: 0; padding-left: 20px; }

        /* Animasi Typing Indicator (Titik Memantul) */
        .typing-indicator { display: flex; align-items: center; gap: 4px; height: 20px; font-style: italic; color: #666; font-size: 0.9em; font-weight: bold;}
        .typing-indicator span { display: block; width: 6px; height: 6px; background-color: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #ddd; }
        #user-input { flex-grow: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; transition: border 0.3s; }
        #user-input:focus { border-color: #0056b3; }
        button { background-color: #0056b3; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #003d82; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">Virtual Assistant BPPD Kalbar</div>
        <div id="chat-box">
            <div class="ai-wrapper">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                <div class="msg-bubble ai-msg">
                    <b>Asisten BPPD:</b><br>Selamat datang di layanan informasi Badan Pengelola Perbatasan Daerah (BPPD) Provinsi Kalimantan Barat. Ada yang bisa saya bantu terkait syarat dokumen lintas batas, profil instansi, atau potensi wisata perbatasan?
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ketik pertanyaan Anda di sini..." onkeypress="handleEnter(event)">
            <button onclick="kirimPesan()">Kirim</button>
        </div>
    </div>

    <script>
        function handleEnter(event) {
            if (event.key === "Enter") { kirimPesan(); }
        }

        async function kirimPesan() {
            const inputElement = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const pesan = inputElement.value.trim();

            if (!pesan) return; 

            // Tampilkan pesan User
            chatBox.innerHTML += `<div class="msg-bubble user-msg"><b>Anda:</b><br>${pesan}</div>`;
            inputElement.value = ""; 
            
            // Tampilkan Avatar + Animasi Loading AI
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="ai-wrapper">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                    <div class="msg-bubble ai-msg">
                        <div class="typing-indicator">
                            Sedang mencari data <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Pastikan URL fetch ini sesuai dengan URL Hugging Face Anda
                const response = await fetch("https://chrysesis-bppd-va.hf.space/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pertanyaan: pesan })
                });

                const data = await response.json();
                
                // Hapus efek loading
                document.getElementById(loadingId).remove();
                
                // Parse format Markdown (tebal, miring, list) menjadi HTML rapi
                const formattedAnswer = marked.parse(data.jawaban);
                
                // Tampilkan Jawaban Final AI + Avatar
                chatBox.innerHTML += `
                    <div class="ai-wrapper">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                        <div class="msg-bubble ai-msg">
                            <b>Asisten BPPD:</b><br>${formattedAnswer}
                        </div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="ai-wrapper">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                        <div class="msg-bubble ai-msg" style="color: red;">
                            <b>Sistem:</b><br>Koneksi ke server terputus atau sedang sibuk. Silakan coba lagi.
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
