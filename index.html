<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Layanan Informasi BPPD Prov. Kalbar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* PERBAIKAN 1: Mencegah elemen melebar ke luar layar (Tombol Kepotong) */
        * { box-sizing: border-box; }

        html, body {
            height: 100%; width: 100%; margin: 0; padding: 0;
            overflow: hidden; position: fixed; 
            background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body { display: flex; justify-content: center; align-items: center; }

        .chat-container { 
            width: 100%; max-width: 600px; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* PERBAIKAN 2: Penyesuaian khusus Desktop/Laptop */
        @media (min-width: 601px) {
            html, body { position: relative; } 
            body { padding: 20px; }
            .chat-container { height: 85vh; max-height: 800px; border-radius: 12px; overflow: hidden; }
            
            /* Di PC, tombol rekomendasi turun ke bawah (wrap), tidak perlu digeser */
            .quick-replies { flex-wrap: wrap; justify-content: center; overflow-x: visible !important; }
        }

        /* HEADER DENGAN TOMBOL RESET */
        .header { 
            background-color: #0056b3; color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 1.2em; border-bottom: 3px solid #003d82; flex-shrink: 0; z-index: 10; 
        }
        .header-spacer { width: 24px; } /* Penyeimbang agar teks tetap di tengah */
        .btn-reset { background: none; border: none; color: white; font-size: 1.2em; cursor: pointer; transition: transform 0.2s; padding: 0; }
        .btn-reset:hover { transform: scale(1.1); }

        /* AREA CHAT */
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #fafafa; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-bubble { padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95em; word-wrap: break-word; }
        .msg-bubble a { color: #0056b3; text-decoration: underline; font-weight: bold; }
        .msg-bubble a:hover { color: #003d82; text-decoration: none; }
        .user-msg { max-width: 80%; background-color: #d1ecf1; color: #0c5460; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #e2e3e5; color: #383d41; border-bottom-left-radius: 2px; flex-grow: 1; overflow-x: auto; }
        
        .ai-wrapper { display: flex; align-items: flex-end; align-self: flex-start; max-width: 90%; gap: 10px; }
        .bot-avatar { width: 35px; height: 35px; border-radius: 50%; background-color: #0056b3; padding: 2px; flex-shrink: 0; }
        
        /* CSS Markdown & Tabel (Saran Tambahan) */
        .msg-bubble p { margin: 0 0 10px 0; }
        .msg-bubble p:last-child { margin: 0; }
        .msg-bubble ul, .msg-bubble ol { margin: 0; padding-left: 20px; }
        .msg-bubble table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 0.9em; }
        .msg-bubble th, .msg-bubble td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .msg-bubble th { background-color: #0056b3; color: white; }

        /* Animasi Typing */
        .typing-indicator { display: flex; align-items: center; gap: 4px; height: 20px; font-style: italic; color: #666; font-size: 0.9em; font-weight: bold;}
        .typing-indicator span { display: block; width: 6px; height: 6px; background-color: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* TOMBOL CEPAT */
        .quick-replies { display: flex; gap: 8px; padding: 10px 15px; background: white; overflow-x: auto; white-space: nowrap; border-top: 1px solid #eee; flex-shrink: 0; scrollbar-width: none; -ms-overflow-style: none; }
        .quick-replies::-webkit-scrollbar { display: none; }
        .quick-replies button { background-color: #f8f9fa; color: #0056b3; font-size: 0.85em; padding: 8px 14px; border-radius: 20px; border: 1px solid #0056b3; cursor: pointer; transition: all 0.2s; white-space: nowrap;}
        .quick-replies button:hover { background-color: #0056b3; color: white; }
        
        /* AREA INPUT */
        .input-area { display: flex; padding: 12px 15px; background: white; border-top: 1px solid #ddd; align-items: center; flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        #user-input { flex-grow: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ccc; outline: none; transition: border 0.3s; font-size: 16px; width: 100%; }
        #user-input:focus { border-color: #0056b3; }
        .btn-send { background-color: #0056b3; color: white; border: none; padding: 12px 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: background 0.3s; flex-shrink: 0; }
        .btn-send:hover { background-color: #003d82; }
        
        .btn-mic { background-color: #28a745; color: white; border: none; width: 44px; height: 44px; border-radius: 50%; margin-left: 8px; cursor: pointer; font-size: 1.2em; transition: background 0.3s; display: flex; justify-content: center; align-items: center; flex-shrink: 0;}
        .btn-mic:hover { background-color: #218838; }
        .btn-mic.recording { background-color: #dc3545; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="header-spacer"></div>
            <span>Virtual Assistant BPPD</span>
            <button class="btn-reset" onclick="hapusObrolan()" title="Mulai Obrolan Baru">🗑️</button>
        </div>
        
        <div id="chat-box">
            <div class="ai-wrapper">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                <div class="msg-bubble ai-msg">
                    <b>Asisten BPPD:</b><br>Selamat datang di layanan informasi Badan Pengelola Perbatasan Daerah (BPPD) Provinsi Kalimantan Barat. Ada yang bisa saya bantu hari ini?
                </div>
            </div>
        </div>
        
        <div class="quick-replies">
            <button onclick="setPertanyaan('Apa syarat melintas di PLBN?')">Syarat Dokumen PLBN</button>
            <button onclick="setPertanyaan('Jam berapa PLBN beroperasi?')">Jam Operasional</button>
            <button onclick="setPertanyaan('Minta kontak layanan pengaduan')">Kontak Pengaduan</button>
            <button onclick="setPertanyaan('Apa saja potensi wisata di perbatasan?')">Wisata Perbatasan</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ketik pertanyaan..." onkeypress="handleEnter(event)">
            <button class="btn-mic" id="mic-btn" onclick="mulaiDikte()" title="Bicara">🎙️</button>
            <button class="btn-send" onclick="kirimPesan()">Kirim</button>
        </div>
    </div>

    <script>
        let riwayatPercakapan = ""; 

        // Fungsi Reset Obrolan
        function hapusObrolan() {
            riwayatPercakapan = "";
            document.getElementById("chat-box").innerHTML = `
                <div class="ai-wrapper">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                    <div class="msg-bubble ai-msg">
                        <b>Asisten BPPD:</b><br>Memori obrolan telah dibersihkan. Mari mulai topik yang baru! Ada yang bisa saya bantu?
                    </div>
                </div>`;
        }

        function setPertanyaan(teks) {
            document.getElementById("user-input").value = teks;
            kirimPesan();
        }

        function handleEnter(event) {
            if (event.key === "Enter") { kirimPesan(); }
        }

        function mulaiDikte() {
            if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('SpeechRecognition')) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                const micBtn = document.getElementById("mic-btn");

                recognition.lang = "id-ID"; 
                recognition.continuous = false;
                
                recognition.onstart = function() {
                    micBtn.classList.add("recording");
                    document.getElementById("user-input").placeholder = "Mendengarkan...";
                };

                recognition.onresult = function(event) {
                    const hasilSuara = event.results[0][0].transcript;
                    document.getElementById('user-input').value = hasilSuara;
                    kirimPesan(); 
                };

                recognition.onerror = function(event) {
                    alert("Gagal mendengarkan. Pastikan izin mikrofon browser aktif.");
                };

                recognition.onend = function() {
                    micBtn.classList.remove("recording");
                    document.getElementById("user-input").placeholder = "Ketik pertanyaan...";
                };

                recognition.start();
            } else {
                alert("Maaf, browser Anda tidak mendukung fitur suara.");
            }
        }

        async function kirimPesan() {
            const inputElement = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const pesan = inputElement.value.trim();

            if (!pesan) return; 

            chatBox.innerHTML += `<div class="msg-bubble user-msg"><b>Anda:</b><br>${pesan}</div>`;
            inputElement.value = ""; 
            
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="ai-wrapper">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                    <div class="msg-bubble ai-msg">
                        <div class="typing-indicator">Mencari data <span></span><span></span><span></span></div>
                    </div>
                </div>`;
            
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("https://chrysesis-bppd-va.hf.space/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        pertanyaan: pesan,
                        riwayat: riwayatPercakapan
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                const formattedAnswer = marked.parse(data.jawaban);
                chatBox.innerHTML += `
                    <div class="ai-wrapper">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                        <div class="msg-bubble ai-msg">
                            <b>Asisten BPPD:</b><br>${formattedAnswer}
                        </div>
                    </div>`;
                
                chatBox.scrollTop = chatBox.scrollHeight;

                riwayatPercakapan += `Pengguna: ${pesan}\nAsisten: ${data.jawaban}\n\n`;
                if(riwayatPercakapan.length > 1000) {
                    riwayatPercakapan = riwayatPercakapan.substring(riwayatPercakapan.length - 1000);
                }
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="ai-wrapper">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=BPPD&backgroundColor=0056b3" class="bot-avatar" alt="Bot">
                        <div class="msg-bubble ai-msg" style="color: red;">
                            <b>Sistem:</b><br>Koneksi ke server terputus.
                        </div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
