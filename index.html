<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Assistant BPPD Kalbar</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        #chat-box { height: 400px; border: 1px solid #ccc; padding: 15px; overflow-y: scroll; margin-bottom: 10px; border-radius: 8px; }
        .user-msg { color: #0056b3; margin-bottom: 10px; text-align: right; }
        .ai-msg { color: #28a745; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>
    <h2>Virtual Assistant BPPD Kalbar</h2>
    <div id="chat-box">
        <div class="ai-msg"><b>Asisten:</b> Halo! Ada yang bisa saya bantu terkait informasi PLBN, Potensi Perbatasan, atau profil BPPD?</div>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="user-input" placeholder="Ketik pertanyaan Anda di sini..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <button onclick="kirimPesan()" style="padding: 10px 20px; border-radius: 5px; cursor: pointer;">Kirim</button>
    </div>

    <script>
        async function kirimPesan() {
            const inputElement = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const pesan = inputElement.value;

            if (!pesan) return; // Jangan kirim jika input kosong

            // 1. Tampilkan pesan user di kotak chat
            chatBox.innerHTML += `<div class="user-msg"><b>Anda:</b> ${pesan}</div>`;
            inputElement.value = ""; // Kosongkan kolom input
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll ke bawah

            try {
                // 2. Kirim permintaan (POST request) ke backend FastAPI
                const response = await fetch("http://127.0.0.1:8000/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pertanyaan: pesan })
                });

                const data = await response.json();
                
                // 3. Tampilkan respons dari backend di kotak chat
                chatBox.innerHTML += `<div class="ai-msg"><b>Asisten:</b> ${data.jawaban}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                chatBox.innerHTML += `<div class="ai-msg" style="color: red;"><b>Error:</b> Gagal terhubung ke server. Pastikan FastAPI sedang berjalan.</div>`;
            }
        }
    </script>
</body>
</html>
